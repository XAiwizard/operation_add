<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAI Wizard - Full Demo (v3.1)</title>
    <link rel="stylesheet" href="xai_wizard.css">
</head>
<body>
<div class="workspace-container">
    <header class="header">
        <div class="brand"><span>🧙 XAI Wizard</span></div>
        <div class="project-info-container">
            📂 프로젝트:&nbsp;
            <span id="project-name" class="project-title">고객 이탈 분석</span>
            <button class="edit-btn" onclick="editProjectName()" title="이름 수정">✎</button>
        </div>
        <div><span style="font-size:.88rem">8급 홍길동</span></div>
    </header>

    <nav class="sidebar">
        <div class="accordion-item">
            <div class="accordion-header active" onclick="toggleAccordion(this,'data')">
                데이터 관리 <span class="arrow">▼</span>
            </div>
            <div class="accordion-body open" id="group-data">
                <div class="sidebar-form">
                    <label class="sidebar-label">로컬 파일 (.xlsx, .csv)</label>
                    <input type="file" id="fileInput" class="sidebar-input"
                           onchange="previewFile()" accept=".csv,.xlsx,.xls">
                    <button class="sidebar-btn" onclick="simulateUpload()">데이터 로드</button>
                </div>
                <div class="sidebar-form" style="border-top:2px dashed #eee">
                    <label class="sidebar-label">피처 스토어</label>
                    <button class="sidebar-btn" style="background:#2ecc71"
                            onclick="openFeatureStorePopup()">목록 불러오기</button>
                </div>
            </div>
        </div>
        <div class="accordion-item">
            <div class="accordion-header" onclick="toggleAccordion(this,'preprocess')">
                전처리 <span class="arrow">▶</span>
            </div>
            <div class="accordion-body" id="group-preprocess">
                <button class="menu-btn" onclick="selectFunction('delete_column')">컬럼 삭제</button>
                <button class="menu-btn" onclick="selectFunction('missing_value')">결측치 처리</button>
                <button class="menu-btn" onclick="selectFunction('scaling')">스케일링 (Scaling)</button>
                <button class="menu-btn" onclick="selectFunction('encoding')">인코딩 (One-Hot)</button>
                <button class="menu-btn" onclick="selectFunction('data_type_conversion')">데이터 형변환</button>
                <button class="menu-btn" onclick="selectFunction('matrix_transpose')">행렬 전치</button>
            </div>
        </div>
        <div class="accordion-item">
            <div class="accordion-header" onclick="toggleAccordion(this,'eda')">
                탐색적 분석 (EDA) <span class="arrow">▶</span>
            </div>
            <div class="accordion-body" id="group-eda">
                <button class="menu-btn" onclick="selectFunction('statistics')">기술 통계</button>
                <button class="menu-btn" onclick="selectFunction('line_chart')">꺾은선 차트</button>
                <button class="menu-btn" onclick="selectFunction('histogram')">히스토그램</button>
                <button class="menu-btn" onclick="selectFunction('pie_chart')">파이 차트</button>
                <button class="menu-btn" onclick="selectFunction('bar_chart')">막대 차트</button>
                <button class="menu-btn" onclick="selectFunction('scatter_plot')">산포 차트</button>
                <button class="menu-btn" onclick="selectFunction('boxplot')">박스플롯</button>
                <button class="menu-btn" onclick="selectFunction('correlation')">상관분석</button>
            </div>
        </div>
        <div class="accordion-item">
            <div class="accordion-header" onclick="toggleAccordion(this,'model')">
                모델링 <span class="arrow">▶</span>
            </div>
            <div class="accordion-body" id="group-model">
                <button class="menu-btn" onclick="selectFunction('linear_reg')">Linear Regression</button>
                <button class="menu-btn" onclick="selectFunction('logistic_reg')">Logistic Regression</button>
                <button class="menu-btn" onclick="selectFunction('dt')">Decision Tree</button>
                <button class="menu-btn" onclick="selectFunction('kmeans')">K-means</button>
                <button class="menu-btn" onclick="selectFunction('svm')">SVM</button>
                <button class="menu-btn" onclick="selectFunction('random_forest')">Random Forest</button>
                <button class="menu-btn" onclick="selectFunction('pca')">PCA</button>
                <button class="menu-btn" onclick="selectFunction('mlr')">MLR</button>
                <button class="menu-btn" onclick="selectFunction('knn')">KNN</button>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="panel-box">
            <div class="panel-header">
                <span id="data-file-name">데이터: customer_churn.csv</span>
                <small style="color:#7f8c8d" id="data-row-count">30 Rows × 10 Columns</small>
            </div>
            <div class="data-grid-container">
                <table class="data-table" id="main-table">
                    <thead><tr id="table-header"></tr></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>
    </main>

    <aside class="right-panel">
        <div class="control-panel">
            <div class="control-header"><span id="ctrl-title">⚙️ 설정</span></div>
            <div class="control-body" id="ctrl-body">
                <div class="empty-state">좌측에서 기능을 선택하거나<br>데이터를 로드하세요.</div>
            </div>
        </div>
        <div class="result-panel">
            <div class="result-header">
                <span>📜 실행 로그</span>
                <button style="background:none;border:none;color:#fff;cursor:pointer;font-size:.85rem"
                        onclick="clearLog()">🧹</button>
            </div>
            <div id="log-content" style="padding:8px">
                <div class="log-item">
                    <span class="log-time">--:--:--</span>
                    <span class="log-info">[Ready]</span> 시스템 준비 완료
                </div>
            </div>
        </div>
    </aside>
</div>

<script>

/* ==========================================================
   1. DATA LAYER
   ========================================================== */

let currentData = {
    columns: ['ID','Age','Gender','Income','Credit_Score','Tenure','Balance','NumOfProducts','IsActive','Churn'],
    types: ['int','int','str','int','int','int','float','int','int','int'],
    rows: []
};

function generateDemoData() {
    const genders = ['Male','Female'];
    for (let i = 1; i <= 30; i++) {
        currentData.rows.push([
            i, Math.floor(Math.random()*35)+20, genders[Math.floor(Math.random()*2)],
            Math.floor(Math.random()*100000)+30000, Math.floor(Math.random()*350)+450,
            Math.floor(Math.random()*10)+1, parseFloat((Math.random()*120000).toFixed(2)),
            Math.floor(Math.random()*3)+1, Math.round(Math.random()), Math.round(Math.random()*0.4)
        ]);
    }
    currentData.rows[2][3]=null; currentData.rows[5][6]=null; currentData.rows[8][1]=null;
    currentData.rows[12][4]=null; currentData.rows[15][3]=null; currentData.rows[20][6]=null;
}
generateDemoData();

/* ==========================================================
   2. TABLE RENDERING
   ========================================================== */

function renderTable() {
    document.getElementById('table-header').innerHTML =
        currentData.columns.map(c => `<th>${c}</th>`).join('');
    document.getElementById('table-body').innerHTML =
        currentData.rows.slice(0,50).map(r => '<tr>' + r.map(c =>
            `<td>${(c===null||c===undefined)?'<span style="color:#e74c3c;font-style:italic">NaN</span>':c}</td>`
        ).join('') + '</tr>').join('');
    document.getElementById('data-row-count').textContent =
        `${currentData.rows.length.toLocaleString()} Rows × ${currentData.columns.length} Columns`;
}
renderTable();

/* ==========================================================
   3. UTILITY FUNCTIONS
   ========================================================== */

function getNumericColumns()     { return currentData.columns.filter((_,i) => currentData.types[i]!=='str'); }
function getCategoricalColumns() { return currentData.columns.filter((_,i) => currentData.types[i]==='str'); }
function getAllColumns()          { return [...currentData.columns]; }

function addLog(msg, type='info') {
    const time = new Date().toLocaleTimeString();
    const cls = type==='success'?'log-success':type==='warn'?'log-warn':'log-info';
    document.getElementById('log-content').innerHTML +=
        `<div class="log-item"><span class="log-time">${time}</span> <span class="${cls}">${msg}</span></div>`;
    document.querySelector('.result-panel').scrollTop = 99999;
}

function clearLog() {
    document.getElementById('log-content').innerHTML =
        `<div class="log-item"><span class="log-time">${new Date().toLocaleTimeString()}</span>
         <span class="log-info">[Cleaned] 로그 초기화</span></div>`;
}

function toggleAccordion(header, group) {
    document.querySelectorAll('.accordion-header').forEach(h => {
        h.classList.remove('active'); h.querySelector('.arrow').textContent = '▶';
    });
    document.querySelectorAll('.accordion-body').forEach(b => b.classList.remove('open'));
    header.classList.add('active'); header.querySelector('.arrow').textContent = '▼';
    document.getElementById('group-'+group).classList.add('open');
}

function editProjectName() {
    const name = prompt('새 프로젝트 이름:', document.getElementById('project-name').innerText);
    if (name && name.trim()) { document.getElementById('project-name').innerText = name.trim(); addLog(`프로젝트명 변경: ${name.trim()}`); }
}

function previewFile() { const f=document.getElementById('fileInput'); if(f.files.length>0) addLog(`파일 선택: ${f.files[0].name}`); }

function simulateUpload() {
    const f=document.getElementById('fileInput');
    if (f.files.length>0) { document.getElementById('data-file-name').textContent=`데이터: ${f.files[0].name}`; addLog(`[로드 완료] ${f.files[0].name}`,'success'); }
    else addLog('[경고] 파일을 먼저 선택하세요.','warn');
}

function colCheckboxes(cols, prefix, checked=false) {
    return `<div class="var-list">${cols.map(c =>
        `<label class="var-item"><input type="checkbox" name="${prefix}" value="${c}" ${checked?'checked':''}> ${c}</label>`
    ).join('')}</div>`;
}

function getChecked(prefix) {
    return [...document.querySelectorAll(`input[name="${prefix}"]:checked`)].map(e=>e.value);
}

function T(text) { return `<span class="tip" data-tip="${text}">ⓘ</span>`; }

function countMissing() {
    let c=0; currentData.rows.forEach(r=>r.forEach(v=>{ if(v===null||v===undefined||v==='') c++; })); return c;
}

function getColValues(col) {
    const ci=currentData.columns.indexOf(col);
    return currentData.rows.map(r=>r[ci]).filter(v=>v!==null&&v!==undefined&&v!=='');
}

function getNumColValues(col) { return getColValues(col).map(Number).filter(v=>!isNaN(v)); }

function openFeatureStorePopup() {
    const w=1100,h=750,left=(screen.width-w)/2,top=(screen.height-h)/2;
    const popup=window.open('','FeatureStore',`width=${w},height=${h},top=${top},left=${left},resizable=yes,scrollbars=yes`);
    if(!popup){alert('팝업을 허용해주세요.');return;}
    popup.featureStoreData=featureStoreData; popup.parentWindow=window;
    popup.document.write(`<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>피처 스토어</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI','Apple SD Gothic Neo',sans-serif;background:#f8f9fa;color:#333}.top-bar{background:#2c3e50;color:#fff;padding:18px 24px;display:flex;justify-content:space-between;align-items:center}.top-bar h1{font-size:1.2rem}.search-box{padding:8px 16px;border:none;border-radius:20px;width:300px;font-size:.9rem}.container{padding:20px}.card{background:#fff;border:1px solid #e0e0e0;border-radius:8px;margin-bottom:12px;transition:box-shadow .2s}.card:hover{box-shadow:0 3px 12px rgba(0,0,0,.1)}.card-top{padding:16px 20px;display:flex;justify-content:space-between;align-items:flex-start;cursor:pointer}.card-title{font-weight:700;font-size:1rem;color:#2c3e50;margin-bottom:4px}.card-desc{font-size:.85rem;color:#666;line-height:1.4}.card-meta{display:flex;gap:14px;font-size:.8rem;color:#888;margin-top:6px}.card-meta span{background:#f0f0f0;padding:2px 8px;border-radius:10px}.card-actions{display:flex;gap:8px;flex-shrink:0;align-items:flex-start}.btn{padding:7px 14px;border:none;border-radius:5px;cursor:pointer;font-size:.82rem;font-weight:600}.btn-preview{background:#ecf0f1;color:#555}.btn-preview:hover{background:#ddd}.btn-load{background:#27ae60;color:#fff}.btn-load:hover{background:#219a52}.preview-area{display:none;padding:0 20px 16px;overflow-x:auto}.preview-area.open{display:block}table{width:100%;border-collapse:collapse;font-size:.85rem;margin-top:8px}th{background:#34495e;color:#fff;padding:8px 12px;text-align:left}td{padding:7px 12px;border-bottom:1px solid #eee}tr:nth-child(even){background:#f8f9fa}</style></head><body>
<div class="top-bar"><h1>📦 피처 스토어 — 데이터 목록</h1><input class="search-box" placeholder="🔍 데이터셋 검색..." oninput="filterCards(this.value)"></div>
<div class="container" id="cc"></div>
<script>let op=null;
function render(l){const c=document.getElementById('cc');if(!l||!l.length){c.innerHTML='<div style="text-align:center;color:#aaa;padding:40px">결과 없음</div>';return;}
c.innerHTML=l.map(d=>\`<div class="card"><div class="card-top" onclick="tp('\${d.id}')"><div><div class="card-title">\${d.name}</div><div class="card-desc">\${d.desc}</div><div class="card-meta"><span>\${d.rows.toLocaleString()} rows</span><span>\${d.cols} cols</span><span>갱신:\${d.updated}</span></div></div><div class="card-actions"><button class="btn btn-preview" id="pb-\${d.id}" onclick="event.stopPropagation();tp('\${d.id}')">👁 미리보기</button><button class="btn btn-load" onclick="event.stopPropagation();ld('\${d.id}')">📥 불러오기</button></div></div><div class="preview-area" id="pv-\${d.id}"><table><thead><tr>\${d.headers.map(h=>\`<th>\${h}</th>\`).join('')}</tr></thead><tbody>\${d.data.map(r=>\`<tr>\${r.map(c=>\`<td>\${c}</td>\`).join('')}</tr>\`).join('')}</tbody></table></div></div>\`).join('');}
function tp(id){if(op&&op!==id){document.getElementById('pv-'+op).classList.remove('open');document.getElementById('pb-'+op).textContent='👁 미리보기';}const el=document.getElementById('pv-'+id),b=document.getElementById('pb-'+id);if(el.classList.contains('open')){el.classList.remove('open');b.textContent='👁 미리보기';op=null;}else{el.classList.add('open');b.textContent='🔼 접기';op=id;}}
function filterCards(q){render(window.featureStoreData.filter(d=>d.name.toLowerCase().includes(q.toLowerCase())||d.desc.toLowerCase().includes(q.toLowerCase())));}
function ld(id){const d=window.featureStoreData.find(x=>x.id===id);if(!d)return;if(window.parentWindow&&window.parentWindow.loadFeatureStoreData){window.parentWindow.loadFeatureStoreData(d);window.close();}else alert('연결 불가');}
render(window.featureStoreData);<\/script></body></html>`);
    popup.document.close(); addLog('피처 스토어 목록 조회');
}

function loadFeatureStoreData(item) {
    currentData.columns=[...item.headers];
    currentData.types=item.headers.map((_,i)=>typeof item.data[0][i]==='number'?'int':'str');
    currentData.rows=item.data.map(r=>[...r]);
    document.getElementById('data-file-name').textContent=`데이터: ${item.name}`;
    renderTable(); addLog(`[로드 완료] ${item.name} (${item.rows.toLocaleString()} rows)`,'success');
}

/* ==========================================================
   5. RESULT POPUP
   ========================================================== */

function openResultPopup(title, html, w=950, h=720) {

    if(!popup){alert('팝업을 허용해주세요.');return null;}
    popup.document.write(`<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>${title}</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI','Apple SD Gothic Neo',sans-serif;background:#f4f6f8;color:#333;padding:24px}
.container{background:#fff;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.08);padding:28px;min-height:500px}

/* ==========================================================
   6. CANVAS CHART FUNCTIONS
   ========================================================== */

const CC = ['#3498db','#e74c3c','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22','#34495e','#16a085','#c0392b','#8e44ad','#d35400'];

function drawBarChart(ctx, labels, values, opt={}) {
    const W=ctx.canvas.width, H=ctx.canvas.height, p={t:40,b:60,l:60,r:20};
    const colors=opt.colors||CC, mx=Math.max(...values)*1.15||1;
    const bw=Math.min(50,(W-p.l-p.r)/labels.length*0.7), gap=(W-p.l-p.r)/labels.length;
    ctx.clearRect(0,0,W,H); ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);
    for(let i=0;i<=5;i++){const y=p.t+(H-p.t-p.b)*(1-i/5);ctx.strokeStyle='#eee';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(W-p.r,y);ctx.stroke();ctx.fillStyle='#888';ctx.font='11px sans-serif';ctx.textAlign='right';ctx.fillText((mx*i/5).toFixed(opt.dec||0),p.l-8,y+4);}
    labels.forEach((lb,i)=>{const x=p.l+gap*i+gap/2-bw/2,h=(values[i]/mx)*(H-p.t-p.b),y=H-p.b-h;ctx.fillStyle=colors[i%colors.length];ctx.fillRect(x,y,bw,h);ctx.fillStyle='#333';ctx.font='bold 11px sans-serif';ctx.textAlign='center';ctx.fillText(values[i].toFixed(opt.dec||0),x+bw/2,y-6);ctx.fillStyle='#555';ctx.font='11px sans-serif';ctx.save();ctx.translate(x+bw/2,H-p.b+10);if(lb.length>6){ctx.rotate(-0.4);ctx.textAlign='right';}ctx.fillText(lb,0,8);ctx.restore();});
    if(opt.title){ctx.fillStyle='#2c3e50';ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.fillText(opt.title,W/2,22);}
}

function drawLineChart(ctx, labels, datasets, opt={}) {
    const W=ctx.canvas.width,H=ctx.canvas.height,p={t:40,b:60,l:60,r:20};
    const colors=['#3498db','#e74c3c','#2ecc71','#f39c12','#9b59b6'];
    let aV=[];datasets.forEach(d=>aV.push(...d.values));
    const mx=Math.max(...aV)*1.15,mn=Math.min(0,Math.min(...aV)),rng=mx-mn;
    ctx.clearRect(0,0,W,H);ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
    for(let i=0;i<=5;i++){const y=p.t+(H-p.t-p.b)*(1-i/5);ctx.strokeStyle='#eee';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(W-p.r,y);ctx.stroke();ctx.fillStyle='#888';ctx.font='11px sans-serif';ctx.textAlign='right';ctx.fillText((mn+rng*i/5).toFixed(0),p.l-8,y+4);}
    const gap=(W-p.l-p.r)/(labels.length-1||1);
    datasets.forEach((ds,di)=>{ctx.strokeStyle=colors[di%5];ctx.lineWidth=2.5;ctx.beginPath();ds.values.forEach((v,i)=>{const x=p.l+gap*i,y=p.t+(H-p.t-p.b)*(1-(v-mn)/rng);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});ctx.stroke();ds.values.forEach((v,i)=>{const x=p.l+gap*i,y=p.t+(H-p.t-p.b)*(1-(v-mn)/rng);ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fillStyle=colors[di%5];ctx.fill();});});
    labels.forEach((lb,i)=>{ctx.fillStyle='#555';ctx.font='11px sans-serif';ctx.textAlign='center';ctx.fillText(lb,p.l+gap*i,H-p.b+18);});
    if(datasets.length>1)datasets.forEach((ds,di)=>{const lx=p.l+di*120;ctx.fillStyle=colors[di%5];ctx.fillRect(lx,H-15,14,10);ctx.fillStyle='#333';ctx.font='11px sans-serif';ctx.textAlign='left';ctx.fillText(ds.label||`S${di+1}`,lx+18,H-6);});
    if(opt.title){ctx.fillStyle='#2c3e50';ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.fillText(opt.title,W/2,22);}
}

function drawPieChart(ctx, labels, values, opt={}) {
    const W=ctx.canvas.width,H=ctx.canvas.height,total=values.reduce((a,b)=>a+b,0);
    const cx=W/2-60,cy=H/2,r=Math.min(W,H)/2-50;
    ctx.clearRect(0,0,W,H);ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
    let sa=-Math.PI/2;
    labels.forEach((lb,i)=>{const sl=(values[i]/total)*Math.PI*2;ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,sa,sa+sl);ctx.closePath();ctx.fillStyle=CC[i%CC.length];ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();const mid=sa+sl/2,lx=cx+Math.cos(mid)*r*0.65,ly=cy+Math.sin(mid)*r*0.65;ctx.fillStyle='#fff';ctx.font='bold 11px sans-serif';ctx.textAlign='center';if(values[i]/total>0.05)ctx.fillText((values[i]/total*100).toFixed(1)+'%',lx,ly+4);sa+=sl;});
    labels.forEach((lb,i)=>{const lx=W-140,ly=30+i*22;ctx.fillStyle=CC[i%CC.length];ctx.fillRect(lx,ly,12,12);ctx.fillStyle='#333';ctx.font='12px sans-serif';ctx.textAlign='left';ctx.fillText(`${lb} (${values[i]})`,lx+18,ly+10);});
    if(opt.title){ctx.fillStyle='#2c3e50';ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.fillText(opt.title,W/2,18);}
}

function drawScatterPlot(ctx, xV, yV, opt={}) {
    const W=ctx.canvas.width,H=ctx.canvas.height,p={t:40,b:55,l:60,r:20};
    const xMx=Math.max(...xV)*1.1,xMn=Math.min(...xV)*0.9,yMx=Math.max(...yV)*1.1,yMn=Math.min(...yV)*0.9;
    ctx.clearRect(0,0,W,H);ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
    for(let i=0;i<=5;i++){const y=p.t+(H-p.t-p.b)*(1-i/5);ctx.strokeStyle='#eee';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(W-p.r,y);ctx.stroke();ctx.fillStyle='#888';ctx.font='10px sans-serif';ctx.textAlign='right';ctx.fillText((yMn+(yMx-yMn)*i/5).toFixed(0),p.l-6,y+4);}
    for(let i=0;i<=5;i++){const x=p.l+(W-p.l-p.r)*i/5;ctx.fillStyle='#888';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.fillText((xMn+(xMx-xMn)*i/5).toFixed(0),x,H-p.b+16);}
    xV.forEach((xv,i)=>{const x=p.l+(xv-xMn)/(xMx-xMn)*(W-p.l-p.r),y=p.t+(1-(yV[i]-yMn)/(yMx-yMn))*(H-p.t-p.b);ctx.beginPath();ctx.arc(x,y,4.5,0,Math.PI*2);ctx.fillStyle='rgba(52,152,219,.6)';ctx.fill();ctx.strokeStyle='#2980b9';ctx.lineWidth=1;ctx.stroke();});
    if(opt.xLabel){ctx.fillStyle='#555';ctx.font='12px sans-serif';ctx.textAlign='center';ctx.fillText(opt.xLabel,(p.l+W-p.r)/2,H-8);}
    if(opt.yLabel){ctx.save();ctx.translate(14,(p.t+H-p.b)/2);ctx.rotate(-Math.PI/2);ctx.fillStyle='#555';ctx.font='12px sans-serif';ctx.textAlign='center';ctx.fillText(opt.yLabel,0,0);ctx.restore();}
    if(opt.title){ctx.fillStyle='#2c3e50';ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.fillText(opt.title,W/2,22);}
}

function drawBoxPlot(ctx, datasets, labels, opt={}) {
    const W=ctx.canvas.width,H=ctx.canvas.height,p={t:40,b:50,l:60,r:20};
    const colors=['#3498db','#e74c3c','#2ecc71','#f39c12','#9b59b6','#1abc9c'];
    let all=[];datasets.forEach(d=>all.push(...d));const mx=Math.max(...all)*1.1,mn=Math.min(...all)*0.9;
    ctx.clearRect(0,0,W,H);ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
    for(let i=0;i<=5;i++){const y=p.t+(H-p.t-p.b)*(1-i/5);ctx.strokeStyle='#eee';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(W-p.r,y);ctx.stroke();ctx.fillStyle='#888';ctx.font='10px sans-serif';ctx.textAlign='right';ctx.fillText((mn+(mx-mn)*i/5).toFixed(0),p.l-6,y+4);}
    const gap=(W-p.l-p.r)/datasets.length,bw=Math.min(50,gap*0.5),toY=v=>p.t+(1-(v-mn)/(mx-mn))*(H-p.t-p.b);
    datasets.forEach((data,i)=>{const s=[...data].sort((a,b)=>a-b),q1=s[Math.floor(s.length*0.25)],q2=s[Math.floor(s.length*0.5)],q3=s[Math.floor(s.length*0.75)],dMin=s[0],dMax=s[s.length-1],cx=p.l+gap*i+gap/2;
    ctx.strokeStyle='#555';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(cx,toY(dMin));ctx.lineTo(cx,toY(dMax));ctx.stroke();ctx.beginPath();ctx.moveTo(cx-bw/4,toY(dMin));ctx.lineTo(cx+bw/4,toY(dMin));ctx.stroke();ctx.beginPath();ctx.moveTo(cx-bw/4,toY(dMax));ctx.lineTo(cx+bw/4,toY(dMax));ctx.stroke();
    ctx.fillStyle=colors[i%6]+'44';ctx.fillRect(cx-bw/2,toY(q3),bw,toY(q1)-toY(q3));ctx.strokeStyle=colors[i%6];ctx.lineWidth=2;ctx.strokeRect(cx-bw/2,toY(q3),bw,toY(q1)-toY(q3));
    ctx.strokeStyle='#c0392b';ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(cx-bw/2,toY(q2));ctx.lineTo(cx+bw/2,toY(q2));ctx.stroke();
    ctx.fillStyle='#555';ctx.font='11px sans-serif';ctx.textAlign='center';ctx.fillText(labels[i]||'',cx,H-p.b+16);});
    if(opt.title){ctx.fillStyle='#2c3e50';ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.fillText(opt.title,W/2,22);}
}

function drawHeatmap(ctx, matrix, labels, opt={}) {
    const W=ctx.canvas.width,H=ctx.canvas.height,n=matrix.length,p={t:50,b:20,l:90,r:60};
    const cW=(W-p.l-p.r)/n,cH=(H-p.t-p.b)/n;
    ctx.clearRect(0,0,W,H);ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
    matrix.forEach((row,i)=>{row.forEach((v,j)=>{const x=p.l+j*cW,y=p.t+i*cH;let r,g,b;if(v>=0){r=255;g=Math.floor(255*(1-v));b=Math.floor(255*(1-v));}else{r=Math.floor(255*(1+v));g=Math.floor(255*(1+v));b=255;}ctx.fillStyle=`rgb(${r},${g},${b})`;ctx.fillRect(x,y,cW,cH);ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.strokeRect(x,y,cW,cH);ctx.fillStyle=Math.abs(v)>0.5?'#fff':'#333';ctx.font='bold 11px sans-serif';ctx.textAlign='center';ctx.fillText(v.toFixed(2),x+cW/2,y+cH/2+4);});});
    labels.forEach((lb,i)=>{ctx.fillStyle='#333';ctx.font='11px sans-serif';ctx.textAlign='right';ctx.fillText(lb,p.l-6,p.t+i*cH+cH/2+4);ctx.save();ctx.translate(p.l+i*cW+cW/2,p.t-6);ctx.rotate(-0.6);ctx.textAlign='right';ctx.fillText(lb,0,0);ctx.restore();});
    if(opt.title){ctx.fillStyle='#2c3e50';ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.fillText(opt.title,W/2,18);}
}

function drawHistogram(ctx, values, opt={}) {
    const bins=opt.bins||10,mn=Math.min(...values),mx=Math.max(...values),bw=(mx-mn)/bins,counts=Array(bins).fill(0);
    values.forEach(v=>{let b=Math.floor((v-mn)/bw);if(b>=bins)b=bins-1;counts[b]++;});
    drawBarChart(ctx,counts.map((_,i)=>(mn+bw*i+bw/2).toFixed(0)),counts,{...opt,colors:['#3498db']});
}

function drawConfusionMatrix(ctx, matrix, labels) {
    const W=ctx.canvas.width,H=ctx.canvas.height,n=matrix.length,p={t:50,b:40,l:70,r:20};
    const cW=(W-p.l-p.r)/n,cH=(H-p.t-p.b)/n,mx=Math.max(...matrix.flat());
    ctx.clearRect(0,0,W,H);ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
    matrix.forEach((row,i)=>{row.forEach((v,j)=>{const x=p.l+j*cW,y=p.t+i*cH,int=v/mx;ctx.fillStyle=i===j?`rgba(39,174,96,${0.2+int*0.7})`:`rgba(231,76,60,${0.1+int*0.5})`;ctx.fillRect(x,y,cW,cH);ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.strokeRect(x,y,cW,cH);ctx.fillStyle='#2c3e50';ctx.font='bold 18px sans-serif';ctx.textAlign='center';ctx.fillText(v,x+cW/2,y+cH/2+7);});});
    labels.forEach((lb,i)=>{ctx.fillStyle='#333';ctx.font='bold 12px sans-serif';ctx.textAlign='right';ctx.fillText(lb,p.l-10,p.t+i*cH+cH/2+5);ctx.textAlign='center';ctx.fillText(lb,p.l+i*cW+cW/2,p.t-10);});
    ctx.fillStyle='#555';ctx.font='12px sans-serif';ctx.textAlign='center';ctx.fillText('Predicted',(p.l+W-p.r)/2,p.t-30);
    ctx.save();ctx.translate(15,(p.t+H-p.b)/2);ctx.rotate(-Math.PI/2);ctx.fillText('Actual',0,0);ctx.restore();
}

function drawTreeVisualization(ctx, features, maxDepth) {
    const W=ctx.canvas.width,H=ctx.canvas.height,depth=Math.min(maxDepth,4);
    const nc=['#3498db','#2ecc71','#f39c12','#e74c3c','#9b59b6'],nw=110,nh=36,vG=70;
    ctx.clearRect(0,0,W,H);ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
    function dn(x,y,w,h,text,col,leaf){
        if(leaf){ctx.fillStyle=col+'33';ctx.beginPath();ctx.ellipse(x+w/2,y+h/2,w/2,h/2,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle=col;ctx.lineWidth=2;ctx.stroke();}
        else{ctx.fillStyle=col+'22';ctx.strokeStyle=col;ctx.lineWidth=2;const r=6;ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();ctx.fill();ctx.stroke();}
        ctx.fillStyle='#2c3e50';ctx.font='bold 11px sans-serif';ctx.textAlign='center';ctx.fillText(text,x+w/2,y+h/2+4);
    }
    function de(x1,y1,x2,y2,lb){ctx.strokeStyle='#999';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.fillStyle='#e74c3c';ctx.font='bold 10px sans-serif';ctx.textAlign='center';ctx.fillText(lb,(x1+x2)/2-10,(y1+y2)/2-3);}
    const rx=W/2-nw/2,ry=15;
    dn(rx,ry,nw,nh,`${features[0%features.length]} ≤ 50`,nc[0],false);
    const l1y=ry+nh+vG;
    de(W/2,ry+nh,W/4,l1y,'True');de(W/2,ry+nh,W*3/4,l1y,'False');
    dn(W/4-nw/2,l1y,nw,nh,`${features[1%features.length]} ≤ 600`,nc[1],false);
    dn(W*3/4-nw/2,l1y,nw,nh,`${features[2%features.length]} ≤ 3`,nc[1],false);
    if(depth>=2){const l2y=l1y+nh+vG;de(W/4,l1y+nh,W/8,l2y,'T');de(W/4,l1y+nh,W*3/8,l2y,'F');de(W*3/4,l1y+nh,W*5/8,l2y,'T');de(W*3/4,l1y+nh,W*7/8,l2y,'F');
    dn(W/8-nw/2,l2y,nw,nh,'Class: 0',nc[2],true);dn(W*3/8-nw/2,l2y,nw,nh,`${features[0%features.length]} ≤ 35`,nc[2],false);dn(W*5/8-nw/2,l2y,nw,nh,'Class: 1',nc[2],true);dn(W*7/8-nw/2,l2y,nw,nh,'Class: 0',nc[2],true);
    if(depth>=3){const l3y=l2y+nh+vG;de(W*3/8,l2y+nh,W*5/16,l3y,'T');de(W*3/8,l2y+nh,W*7/16,l3y,'F');dn(W*5/16-nw/2,l3y,nw,nh,'Class: 1',nc[3],true);dn(W*7/16-nw/2,l3y,nw,nh,'Class: 0',nc[3],true);}}
    ctx.fillStyle='#2c3e50';ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.fillText('Decision Tree Structure',W/2,H-10);
}

function selectFunction(fn) {
    document.querySelectorAll('.menu-btn').forEach(b=>b.classList.remove('active-func'));
    if(event&&event.target)event.target.classList.add('active-func');
    const ct=document.getElementById('ctrl-title'),cb=document.getElementById('ctrl-body');
    const nc=getNumericColumns(),cc=getCategoricalColumns(),ac=getAllColumns();
    switch(fn){
    case 'delete_column':
        ct.innerText='🗑️ 컬럼 삭제';
        cb.innerHTML=`<div class="info-box">불필요한 컬럼을 선택하여 삭제합니다.</div>
            <div class="form-group"><label class="form-label">대상 컬럼 ${T('삭제할 컬럼을 체크하세요. 복수 선택 가능.')}</label>${colCheckboxes(ac,'del_cols')}</div>
            <button class="btn-action btn-danger" onclick="execDeleteColumns()">선택 컬럼 삭제</button>`;
        addLog('컬럼 삭제 선택');break;
    case 'missing_value':
        ct.innerText='🔧 결측치 처리';
        cb.innerHTML=`<div class="warn-box">현재 결측치: <strong>${countMissing()}</strong>건</div>
            <div class="form-group"><label class="form-label">대상 컬럼 ${T('결측치를 처리할 컬럼을 선택합니다.')}</label>${colCheckboxes(ac,'mv_cols',true)}</div>
            <div class="form-group"><label class="form-label">처리 방법 ${T('Drop: 결측 행 삭제, Mean/Median/Mode: 대표값 대체')}</label>
            <select class="form-select" id="mv_method"><option value="drop_row">행 삭제 (Drop Rows)</option><option value="mean">평균값 대체 (Mean)</option><option value="median">중앙값 대체 (Median)</option><option value="mode">최빈값 대체 (Mode)</option><option value="zero">0으로 대체</option></select></div>
            <button class="btn-action" onclick="execMissingValue()">결측치 처리 실행</button>`;
        addLog('결측치 처리 선택');break;
    case 'scaling':
        ct.innerText='📏 스케일링';
        cb.innerHTML=`<div class="info-box">수치형 컬럼의 값 범위를 정규화합니다.</div>
            <div class="form-group"><label class="form-label">대상 컬럼 ${T('스케일링할 수치형 컬럼을 선택합니다.')}</label>${colCheckboxes(nc,'sc_cols')}</div>
            <div class="form-group"><label class="form-label">스케일러 ${T('Standard: 평균0/표준편차1, MinMax: 0~1, Robust: IQR 기반')}</label>
            <select class="form-select" id="sc_method"><option value="standard">StandardScaler (Z-score)</option><option value="minmax">MinMaxScaler (0~1)</option><option value="robust">RobustScaler (IQR)</option></select></div>
            <button class="btn-action" onclick="execScaling()">스케일링 적용</button>`;
        addLog('스케일링 선택');break;

/* ==========================================================
   8. PREPROCESSING EXECUTION
   ========================================================== */

function execDeleteColumns(){const c=getChecked('del_cols');if(!c.length){addLog('[경고] 컬럼 선택','warn');return;}c.map(x=>currentData.columns.indexOf(x)).filter(i=>i>=0).sort((a,b)=>b-a).forEach(i=>{currentData.columns.splice(i,1);currentData.types.splice(i,1);currentData.rows.forEach(r=>r.splice(i,1));});renderTable();addLog(`[완료] ${c.join(', ')} 삭제됨`,'success');selectFunction('delete_column');}

function execMissingValue(){const m=document.getElementById('mv_method').value;let fixed=0;
if(m==='drop_row'){const b=currentData.rows.length;currentData.rows=currentData.rows.filter(r=>!r.some(c=>c===null||c===undefined||c===''));fixed=b-currentData.rows.length;addLog(`[완료] ${fixed}행 삭제됨`,'success');}
else{currentData.rows.forEach((r,ri)=>{r.forEach((cell,ci)=>{if(cell===null||cell===undefined||cell===''){const v=currentData.rows.map(x=>x[ci]).filter(v=>v!==null&&v!==undefined&&v!==''&&!isNaN(v));let rep;switch(m){case'mean':rep=parseFloat((v.reduce((a,b)=>a+Number(b),0)/v.length).toFixed(2));break;case'median':{const s=v.map(Number).sort((a,b)=>a-b);rep=s.length%2===0?(s[s.length/2-1]+s[s.length/2])/2:s[Math.floor(s.length/2)];break;}case'mode':{const f={};v.forEach(x=>{f[x]=(f[x]||0)+1;});rep=Object.entries(f).sort((a,b)=>b[1]-a[1])[0][0];if(!isNaN(rep))rep=Number(rep);break;}case'zero':rep=0;break;}currentData.rows[ri][ci]=rep;fixed++;}});});addLog(`[완료] ${fixed}건 처리 (${m})`,'success');}
renderTable();selectFunction('missing_value');}

function execScaling(){const cols=getChecked('sc_cols'),m=document.getElementById('sc_method').value;if(!cols.length){addLog('[경고] 컬럼 선택','warn');return;}
cols.forEach(col=>{const ci=currentData.columns.indexOf(col),vals=currentData.rows.map(r=>Number(r[ci])).filter(v=>!isNaN(v));if(!vals.length)return;
const mean=vals.reduce((a,b)=>a+b,0)/vals.length,std=Math.sqrt(vals.reduce((a,b)=>a+(b-mean)**2,0)/vals.length)||1,mn=Math.min(...vals),mx=Math.max(...vals);
const sorted=[...vals].sort((a,b)=>a-b),q1=sorted[Math.floor(sorted.length*0.25)],q3=sorted[Math.floor(sorted.length*0.75)],iqr=q3-q1||1,med=sorted[Math.floor(sorted.length*0.5)];
currentData.rows.forEach(r=>{const v=Number(r[ci]);if(isNaN(v))return;switch(m){case'standard':r[ci]=parseFloat(((v-mean)/std).toFixed(4));break;case'minmax':r[ci]=parseFloat(((v-mn)/(mx-mn||1)).toFixed(4));break;case'robust':r[ci]=parseFloat(((v-med)/iqr).toFixed(4));break;}});currentData.types[ci]='float';});
renderTable();addLog(`[완료] ${cols.join(', ')} 스케일링 (${m})`,'success');}

function execEncoding(){const cols=getChecked('enc_cols');if(!cols.length){addLog('[경고] 컬럼 선택','warn');return;}
cols.forEach(col=>{const ci=currentData.columns.indexOf(col),uv=[...new Set(currentData.rows.map(r=>r[ci]))].filter(v=>v!==null);uv.forEach(u=>{currentData.columns.push(`${col}_${u}`);currentData.types.push('int');currentData.rows.forEach(r=>r.push(r[ci]===u?1:0));});const idx=currentData.columns.indexOf(col);currentData.columns.splice(idx,1);currentData.types.splice(idx,1);currentData.rows.forEach(r=>r.splice(idx,1));});
renderTable();addLog(`[완료] ${cols.join(', ')} 인코딩`,'success');}

function execTypeConversion(){const col=document.getElementById('conv_col').value,nt=document.getElementById('conv_type').value,ci=currentData.columns.indexOf(col);currentData.rows.forEach(r=>{switch(nt){case'int':r[ci]=parseInt(r[ci])||0;break;case'float':r[ci]=parseFloat(r[ci])||0;break;case'str':r[ci]=String(r[ci]);break;}});currentData.types[ci]=nt;renderTable();addLog(`[완료] ${col} → ${nt}`,'success');}

function execTranspose(){const nC=['Index',...currentData.rows.map((_,i)=>'R'+(i+1))].slice(0,31),nR=currentData.columns.map((col,ci)=>[col,...currentData.rows.map(r=>r[ci])].slice(0,31));currentData.columns=nC;currentData.types=nC.map(()=>'str');currentData.rows=nR;renderTable();addLog(`[완료] 전치 (${nR.length}×${nC.length})`,'success');}

   ========================================================== */

function execStatistics(){const cols=getChecked('stat_cols');if(!cols.length){addLog('[경고] 컬럼 선택','warn');return;}
const sn=['Count','Mean','Std','Min','25%','50%','75%','Max','Missing'],data={};
cols.forEach(c=>{const v=getNumColValues(c),s=[...v].sort((a,b)=>a-b),mn=v.reduce((a,b)=>a+b,0)/v.length,sd=Math.sqrt(v.reduce((a,b)=>a+(b-mn)**2,0)/v.length);data[c]=[v.length,mn.toFixed(2),sd.toFixed(2),Math.min(...v).toFixed(2),s[Math.floor(s.length*0.25)]?.toFixed(2)||'-',s[Math.floor(s.length*0.5)]?.toFixed(2)||'-',s[Math.floor(s.length*0.75)]?.toFixed(2)||'-',Math.max(...v).toFixed(2),currentData.rows.length-getColValues(c).length];});
let t='<table class="st"><tr><th>통계량</th>'+cols.map(c=>`<th>${c}</th>`).join('')+'</tr>';sn.forEach((s,si)=>{t+=`<tr><td style="font-weight:600;text-align:left">${s}</td>`+cols.map(c=>`<td>${data[c][si]}</td>`).join('')+'</tr>';});t+='</table>';
openResultPopup('기술 통계',`<h2>📊 기술 통계</h2>${t}`);addLog('기술 통계 완료','success');}

function execLineChart(){const x=document.getElementById('line_x').value,yc=getChecked('line_y');if(!yc.length){addLog('[경고] Y축 선택','warn');return;}const lb=getColValues(x).slice(0,30).map(String),ds=yc.map(c=>({label:c,values:getNumColValues(c).slice(0,30)}));const p=openResultPopup('꺾은선',`<h2>📈 꺾은선 차트</h2><div class="cw"><canvas id="cv" width="850" height="420"></canvas></div>`);if(p)setTimeout(()=>drawLineChart(p.document.getElementById('cv').getContext('2d'),lb,ds,{title:`${yc.join(', ')} by ${x}`}),200);addLog('꺾은선 차트 완료','success');}

function execHistogram(){const col=document.getElementById('hist_col').value,bins=parseInt(document.getElementById('hist_bins').value)||10,v=getNumColValues(col);const p=openResultPopup('히스토그램',`<h2>📊 히스토그램 — ${col}</h2><div class="cw"><canvas id="cv" width="850" height="420"></canvas></div><div class="note">${v.length}건 | Bins: ${bins}</div>`);if(p)setTimeout(()=>drawHistogram(p.document.getElementById('cv').getContext('2d'),v,{bins,title:`${col} Distribution`}),200);addLog(`히스토그램 (${col})`,'success');}

function execPieChart(){const col=document.getElementById('pie_col').value,v=getColValues(col),freq={};v.forEach(x=>{freq[x]=(freq[x]||0)+1;});const p=openResultPopup('파이',`<h2>🥧 파이 — ${col}</h2><div class="cw"><canvas id="cv" width="700" height="450"></canvas></div>`);if(p)setTimeout(()=>drawPieChart(p.document.getElementById('cv').getContext('2d'),Object.keys(freq),Object.values(freq),{title:col}),200);addLog('파이 차트 완료','success');}

function execBarChart(){const xc=document.getElementById('bar_x').value,yc=document.getElementById('bar_y').value;let lb,vl,yl;if(!yc){const f={};getColValues(xc).forEach(v=>{f[v]=(f[v]||0)+1;});lb=Object.keys(f);vl=Object.values(f);yl='Count';}else{const g={},xi=currentData.columns.indexOf(xc),yi=currentData.columns.indexOf(yc);currentData.rows.forEach(r=>{const k=String(r[xi]);if(!g[k])g[k]=[];const v=Number(r[yi]);if(!isNaN(v))g[k].push(v);});lb=Object.keys(g);vl=lb.map(k=>g[k].length?g[k].reduce((a,b)=>a+b,0)/g[k].length:0);yl=`${yc}(평균)`;}const p=openResultPopup('막대',`<h2>📊 막대 차트</h2><div class="cw"><canvas id="cv" width="850" height="420"></canvas></div>`);if(p)setTimeout(()=>drawBarChart(p.document.getElementById('cv').getContext('2d'),lb,vl,{title:`${yl} by ${xc}`,dec:yc?1:0}),200);addLog('막대 차트 완료','success');}

function execScatter(){const xc=document.getElementById('scat_x').value,yc=document.getElementById('scat_y').value,xv=getNumColValues(xc),yv=getNumColValues(yc),n=Math.min(xv.length,yv.length);const p=openResultPopup('산포',`<h2>🔵 산포 차트</h2><div class="cw"><canvas id="cv" width="850" height="450"></canvas></div>`);if(p)setTimeout(()=>drawScatterPlot(p.document.getElementById('cv').getContext('2d'),xv.slice(0,n),yv.slice(0,n),{xLabel:xc,yLabel:yc,title:`${xc} vs ${yc}`}),200);addLog('산포 차트 완료','success');}

function execBoxplot(){const cols=getChecked('box_cols');if(!cols.length){addLog('[경고] 컬럼 선택','warn');return;}const ds=cols.map(c=>getNumColValues(c));const p=openResultPopup('박스플롯',`<h2>📦 박스플롯</h2><div class="cw"><canvas id="cv" width="850" height="450"></canvas></div>`);if(p)setTimeout(()=>drawBoxPlot(p.document.getElementById('cv').getContext('2d'),ds,cols,{title:'Box Plot'}),200);addLog('박스플롯 완료','success');}

function execCorrelation(){const cols=getChecked('corr_cols'),method=document.getElementById('corr_method').value;if(cols.length<2){addLog('[경고] 2개 이상 선택','warn');return;}
const data=cols.map(c=>getNumColValues(c)),matrix=cols.map((_,i)=>cols.map((_,j)=>{if(i===j)return 1;const xi=data[i],xj=data[j],l=Math.min(xi.length,xj.length),mx=xi.slice(0,l).reduce((a,b)=>a+b,0)/l,my=xj.slice(0,l).reduce((a,b)=>a+b,0)/l;let num=0,dx=0,dy=0;for(let k=0;k<l;k++){num+=(xi[k]-mx)*(xj[k]-my);dx+=(xi[k]-mx)**2;dy+=(xj[k]-my)**2;}return num/(Math.sqrt(dx*dy)||1);}));
let tbl='<table class="st"><tr><th></th>'+cols.map(c=>`<th>${c}</th>`).join('')+'</tr>';matrix.forEach((row,i)=>{tbl+=`<tr><td style="font-weight:600">${cols[i]}</td>`+row.map(v=>{const bg=v>0.5?'#d4edda':v<-0.5?'#f8d7da':'#fff';return `<td style="background:${bg}">${v.toFixed(3)}</td>`;}).join('')+'</tr>';});tbl+='</table>';
const p=openResultPopup('상관분석',`<h2>🔗 상관분석 (${method})</h2><div class="tb"><button class="tbtn active" onclick="showTab(this,'t1')">히트맵</button><button class="tbtn" onclick="showTab(this,'t2')">상관계수 표</button></div><div class="tc active" id="t1"><div class="cw"><canvas id="cv" width="650" height="550"></canvas></div></div><div class="tc" id="t2">${tbl}</div><script>function showTab(b,id){document.querySelectorAll('.tc').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tbtn').forEach(x=>x.classList.remove('active'));document.getElementById(id).classList.add('active');b.classList.add('active');}<\/script>`,800,750);
if(p)setTimeout(()=>drawHeatmap(p.document.getElementById('cv').getContext('2d'),matrix,cols,{title:`${method} Correlation`}),300);addLog(`상관분석 완료 (${method})`,'success');}

/* ==========================================================
   10. MODELING EXECUTION
   ========================================================== */

function execModel(id){if(id==='kmeans'){execKmeans();return;}if(id==='pca'){execPCA();return;}
const target=document.getElementById(`${id}_target`)?.value,features=getChecked(`${id}_features`),split=parseInt(document.getElementById(`${id}_split`)?.value||'30');
if(!target){addLog('[경고] Target 선택','warn');return;}if(!features.length){addLog('[경고] Feature 선택','warn');return;}
const trainN=Math.floor(currentData.rows.length*(1-split/100)),testN=currentData.rows.length-trainN;
switch(id){case'linear_reg':case'mlr':execRegression(id,target,features,trainN,testN);break;case'logistic_reg':execClassification(id,'Logistic Reg',target,features,trainN,testN);break;case'dt':execDT(target,features,trainN,testN);break;case'svm':execClassification(id,'SVM',target,features,trainN,testN);break;case'random_forest':execClassification(id,'Random Forest',target,features,trainN,testN);break;case'knn':{const task=document.getElementById('knn_task')?.value||'classification';task==='regression'?execRegression(id,target,features,trainN,testN):execClassification(id,'KNN',target,features,trainN,testN);break;}}}

function execRegression(id,target,features,trainN,testN){
const r2t=0.82+Math.random()*0.15,r2=r2t-Math.random()*0.12,rmseT=500+Math.random()*2000,rmse=rmseT*(1+Math.random()*0.3),maeT=rmseT*0.7,mae=rmse*0.75,ovfit=(r2t-r2)>0.1;
const name=id==='linear_reg'?'Linear Regression':id==='mlr'?'MLR':'KNN Regression';
let coefHTML='';if(id!=='knn'){coefHTML='<h3>📐 회귀 계수</h3><table class="mt"><tr><th>Feature</th><th>Coefficient</th><th>영향도</th></tr>';features.forEach(f=>{const c=(Math.random()*2-1)*1000,bar=Math.min(100,Math.abs(c)/10);coefHTML+=`<tr><td>${f}</td><td style="font-weight:600">${c.toFixed(4)}</td><td><div style="background:#3498db;height:12px;width:${bar}%;border-radius:3px"></div></td></tr>`;});coefHTML+='</table>';}
const actual=Array.from({length:20},()=>10000+Math.random()*80000),predicted=actual.map(v=>v+(Math.random()-0.5)*20000);
const p=openResultPopup(`${name}`,`<h2>📉 ${name} 결과</h2><div class="note">Train: ${trainN}건 | Test: ${testN}건 | Features: ${features.join(', ')}</div>${ovfit?'<div class="owarn">⚠️ <strong>과적합 경고</strong></div>':''}
<div class="tb"><button class="tbtn active" onclick="showTab(this,'t1')">성능 지표</button><button class="tbtn" onclick="showTab(this,'t2')">예측 vs 실제</button>${id!=='knn'?'<button class="tbtn" onclick="showTab(this,\'t3\')">회귀 계수</button>':''}</div>
<div class="tc active" id="t1"><table class="mt"><tr><th>지표</th><th>Train</th><th>Test</th><th>평가</th></tr><tr><td>R²</td><td>${r2t.toFixed(4)}</td><td>${r2.toFixed(4)}</td><td><span class="badge ${r2>0.7?'bg':r2>0.5?'bw':'bb'}">${r2>0.7?'양호':r2>0.5?'보통':'부족'}</span></td></tr><tr><td>RMSE</td><td>${rmseT.toFixed(2)}</td><td>${rmse.toFixed(2)}</td><td>-</td></tr><tr><td>MAE</td><td>${maeT.toFixed(2)}</td><td>${mae.toFixed(2)}</td><td>-</td></tr></table></div>
<div class="tc" id="t2"><div class="cw"><canvas id="cv" width="700" height="400"></canvas></div></div>${id!=='knn'?`<div class="tc" id="t3">${coefHTML}</div>`:''}
<script>function showTab(b,id){document.querySelectorAll('.tc').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tbtn').forEach(x=>x.classList.remove('active'));document.getElementById(id).classList.add('active');b.classList.add('active');}<\/script>`);
if(p)setTimeout(()=>{const ctx=p.document.getElementById('cv').getContext('2d');drawScatterPlot(ctx,actual,predicted,{xLabel:'Actual',yLabel:'Predicted',title:'Predicted vs Actual'});ctx.strokeStyle='#e74c3c';ctx.lineWidth=1.5;ctx.setLineDash([5,5]);ctx.beginPath();ctx.moveTo(60,ctx.canvas.height-55);ctx.lineTo(ctx.canvas.width-20,40);ctx.stroke();ctx.setLineDash([]);},300);
addLog(`[${name}] R²(Test)=${r2.toFixed(4)}`,'success');}

function execClassification(id,name,target,features,trainN,testN){
const at=0.85+Math.random()*0.13,a=at-Math.random()*0.08,pr=a-Math.random()*0.05,rc=a-Math.random()*0.03,f1=2*pr*rc/(pr+rc),ovfit=(at-a)>0.08;
const tp=Math.floor(testN*0.4*a),tn=Math.floor(testN*0.6*a),fp=Math.floor(testN*0.6*(1-a)),fn=testN-tp-tn-fp,cm=[[tn,fp],[Math.abs(fn),tp]];
const imp=features.map(()=>Math.random()),total=imp.reduce((a,b)=>a+b,0),sorted=features.map((f,i)=>({n:f,v:imp[i]/total})).sort((a,b)=>b.v-a.v);
let extra='';if(id==='svm')extra=`Kernel: ${document.getElementById('svm_kernel')?.value||'rbf'}`;if(id==='random_forest')extra=`n_est: ${document.getElementById('rf_n')?.value||100}`;if(id==='knn')extra=`K: ${document.getElementById('knn_k')?.value||5}`;
const p=openResultPopup(`${name}`,`<h2>🎯 ${name} 결과</h2><div class="note">Train: ${trainN}건 | Test: ${testN}건 | Features: ${features.join(', ')}${extra?' | '+extra:''}</div>${ovfit?'<div class="owarn">⚠️ <strong>과적합 경고</strong></div>':''}
<div class="tb"><button class="tbtn active" onclick="showTab(this,'t1')">성능 지표</button><button class="tbtn" onclick="showTab(this,'t2')">혼동 행렬</button><button class="tbtn" onclick="showTab(this,'t3')">Feature Imp.</button></div>
<div class="tc active" id="t1"><table class="mt"><tr><th>지표</th><th>Train</th><th>Test</th><th>평가</th></tr><tr><td>Accuracy</td><td>${at.toFixed(4)}</td><td>${a.toFixed(4)}</td><td><span class="badge ${a>0.8?'bg':a>0.6?'bw':'bb'}">${a>0.8?'양호':a>0.6?'보통':'부족'}</span></td></tr><tr><td>Precision</td><td>-</td><td>${pr.toFixed(4)}</td><td>-</td></tr><tr><td>Recall</td><td>-</td><td>${rc.toFixed(4)}</td><td>-</td></tr><tr><td>F1-Score</td><td>-</td><td>${f1.toFixed(4)}</td><td>-</td></tr></table></div>
<div class="tc" id="t2"><div class="cw"><canvas id="cmCv" width="400" height="350"></canvas></div></div>
<div class="tc" id="t3"><div class="cw"><canvas id="impCv" width="700" height="400"></canvas></div></div>
<script>function showTab(b,id){document.querySelectorAll('.tc').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tbtn').forEach(x=>x.classList.remove('active'));document.getElementById(id).classList.add('active');b.classList.add('active');}<\/script>`);
if(p)setTimeout(()=>{drawConfusionMatrix(p.document.getElementById('cmCv').getContext('2d'),cm,['0','1']);drawBarChart(p.document.getElementById('impCv').getContext('2d'),sorted.map(f=>f.n),sorted.map(f=>f.v),{title:'Feature Importance',dec:3});},300);
addLog(`[${name}] Acc=${a.toFixed(4)}, F1=${f1.toFixed(4)}`,'success');}

function execDT(target,features,trainN,testN){
const maxD=parseInt(document.getElementById('dt_depth')?.value)||5,at=0.85+Math.random()*0.13,a=at-Math.random()*0.08,pr=a-Math.random()*0.05,rc=a-Math.random()*0.03,f1=2*pr*rc/(pr+rc),ovfit=(at-a)>0.08;
const tp=Math.floor(testN*0.4*a),tn=Math.floor(testN*0.6*a),fp=Math.floor(testN*0.6*(1-a)),fn=testN-tp-tn-fp,cm=[[tn,fp],[Math.abs(fn),tp]];
const imp=features.map(()=>Math.random()),total=imp.reduce((a,b)=>a+b,0),sorted=features.map((f,i)=>({n:f,v:imp[i]/total})).sort((a,b)=>b.v-a.v);
const p=openResultPopup('Decision Tree',`<h2>🌲 Decision Tree 결과</h2><div class="note">Train: ${trainN}건 | Test: ${testN}건 | Max Depth: ${maxD} | Features: ${features.join(', ')}</div>${ovfit?'<div class="owarn">⚠️ <strong>과적합 경고</strong></div>':''}
<div class="tb"><button class="tbtn active" onclick="showTab(this,'t1')">성능 지표</button><button class="tbtn" onclick="showTab(this,'t2')">혼동 행렬</button><button class="tbtn" onclick="showTab(this,'t3')">Feature Imp.</button><button class="tbtn" onclick="showTab(this,'t4')">🌲 트리 시각화</button></div>
<div class="tc active" id="t1"><table class="mt"><tr><th>지표</th><th>Train</th><th>Test</th><th>평가</th></tr><tr><td>Accuracy</td><td>${at.toFixed(4)}</td><td>${a.toFixed(4)}</td><td><span class="badge ${a>0.8?'bg':a>0.6?'bw':'bb'}">${a>0.8?'양호':a>0.6?'보통':'부족'}</span></td></tr><tr><td>Precision</td><td>-</td><td>${pr.toFixed(4)}</td><td>-</td></tr><tr><td>Recall</td><td>-</td><td>${rc.toFixed(4)}</td><td>-</td></tr><tr><td>F1-Score</td><td>-</td><td>${f1.toFixed(4)}</td><td>-</td></tr></table></div>
<div class="tc" id="t2"><div class="cw"><canvas id="cmCv" width="400" height="350"></canvas></div></div>
<div class="tc" id="t3"><div class="cw"><canvas id="impCv" width="700" height="400"></canvas></div></div>
<div class="tc" id="t4"><div class="cw"><canvas id="treeCv" width="850" height="450"></canvas></div><div class="note">Max Depth(${maxD})에 따라 트리 구성. 시각화는 최대 4단계까지 표시.</div></div>
<script>function showTab(b,id){document.querySelectorAll('.tc').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tbtn').forEach(x=>x.classList.remove('active'));document.getElementById(id).classList.add('active');b.classList.add('active');}<\/script>`,1000,780);
if(p)setTimeout(()=>{drawConfusionMatrix(p.document.getElementById('cmCv').getContext('2d'),cm,['0','1']);drawBarChart(p.document.getElementById('impCv').getContext('2d'),sorted.map(f=>f.n),sorted.map(f=>f.v),{title:'Feature Importance',dec:3});drawTreeVisualization(p.document.getElementById('treeCv').getContext('2d'),features,maxD);},300);
addLog(`[DT] Acc=${a.toFixed(4)}, MaxDepth=${maxD}`,'success');}

function execKmeans(){const features=getChecked('km_features'),k=parseInt(document.getElementById('km_k').value)||3;if(features.length<2){addLog('[경고] 2개 이상 Feature','warn');return;}
const n=currentData.rows.length,sizes=[];let rem=n;for(let i=0;i<k;i++){const s=i<k-1?Math.floor(rem/(k-i)+(Math.random()-0.5)*5):rem;sizes.push(s);rem-=s;}
const colors=['#3498db','#e74c3c','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22','#34495e','#c0392b','#16a085'],pts=[];
for(let c=0;c<k;c++){const cx=Math.random()*80+10,cy=Math.random()*80+10;for(let j=0;j<sizes[c];j++)pts.push({x:cx+(Math.random()-0.5)*30,y:cy+(Math.random()-0.5)*30,c});}
const inertia=(800+Math.random()*2000).toFixed(2),sil=(0.3+Math.random()*0.5).toFixed(4);
const p=openResultPopup('K-means',`<h2>🎨 K-means Clustering</h2><div class="note">K=${k} | Features: ${features.join(', ')} | ${n}건</div>
<div class="tb"><button class="tbtn active" onclick="showTab(this,'t1')">성능 지표</button><button class="tbtn" onclick="showTab(this,'t2')">시각화</button></div>
<div class="tc active" id="t1"><table class="mt"><tr><th>지표</th><th>값</th><th>설명</th></tr><tr><td>Inertia</td><td>${inertia}</td><td>클러스터 내 분산 합계</td></tr><tr><td>Silhouette</td><td>${sil}</td><td><span class="badge ${parseFloat(sil)>0.5?'bg':'bw'}">${parseFloat(sil)>0.5?'양호':'보통'}</span></td></tr></table>
<h3>클러스터별 크기</h3><table class="mt"><tr><th>Cluster</th><th>개수</th><th>비율</th></tr>${sizes.map((s,i)=>`<tr><td style="color:${colors[i]};font-weight:700">C${i}</td><td>${s}</td><td>${(s/n*100).toFixed(1)}%</td></tr>`).join('')}</table></div>
<div class="tc" id="t2"><div class="cw"><canvas id="cv" width="700" height="450"></canvas></div></div>
<script>function showTab(b,id){document.querySelectorAll('.tc').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tbtn').forEach(x=>x.classList.remove('active'));document.getElementById(id).classList.add('active');b.classList.add('active');}<\/script>`);
if(p)setTimeout(()=>{const ctx=p.document.getElementById('cv').getContext('2d'),c=ctx.canvas;ctx.clearRect(0,0,c.width,c.height);ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width,c.height);const pd={t:40,b:50,l:50,r:20};pts.forEach(pt=>{const x=pd.l+(pt.x/100)*(c.width-pd.l-pd.r),y=pd.t+(1-pt.y/100)*(c.height-pd.t-pd.b);ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);ctx.fillStyle=colors[pt.c]+'AA';ctx.fill();ctx.strokeStyle=colors[pt.c];ctx.lineWidth=1;ctx.stroke();});
for(let i=0;i<k;i++){ctx.fillStyle=colors[i];ctx.fillRect(pd.l+i*100,c.height-20,14,14);ctx.fillStyle='#333';ctx.font='12px sans-serif';ctx.textAlign='left';ctx.fillText(`C${i}`,pd.l+i*100+18,c.height-9);}
ctx.fillStyle='#2c3e50';ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.fillText(`K-means (K=${k})`,c.width/2,22);},300);
addLog(`[K-means] K=${k}, Sil=${sil}`,'success');}

function execPCA(){const features=getChecked('pca_features'),nc=parseInt(document.getElementById('pca_n').value)||2;if(features.length<2){addLog('[경고] 2개 이상 Feature','warn');return;}
const vars=[];let rem=1;for(let i=0;i<Math.min(nc,features.length);i++){const v=i<nc-1?rem*(0.3+Math.random()*0.4):rem;vars.push(v);rem-=v;}
const cum=vars.reduce((a,v,i)=>{a.push((a[i-1]||0)+v);return a;},[]),tot=cum[cum.length-1];
const pts=Array.from({length:currentData.rows.length},()=>({x:(Math.random()-0.5)*6,y:(Math.random()-0.5)*4}));
const p=openResultPopup('PCA',`<h2>🔬 PCA 결과</h2><div class="note">Components: ${nc} | Features: ${features.join(', ')}</div>
<div class="tb"><button class="tbtn active" onclick="showTab(this,'t1')">설명 분산</button><button class="tbtn" onclick="showTab(this,'t2')">2D 투영</button></div>
<div class="tc active" id="t1"><table class="mt"><tr><th>Component</th><th>설명 분산</th><th>누적</th></tr>${vars.map((v,i)=>`<tr><td>PC${i+1}</td><td>${(v*100).toFixed(2)}%</td><td>${(cum[i]*100).toFixed(2)}%</td></tr>`).join('')}</table>
<div style="margin-top:10px"><span class="badge ${tot>0.8?'bg':'bw'}">총 설명력: ${(tot*100).toFixed(1)}%</span></div>
<div class="cw" style="margin-top:15px"><canvas id="barCv" width="600" height="300"></canvas></div></div>
<div class="tc" id="t2"><div class="cw"><canvas id="scCv" width="700" height="450"></canvas></div></div>
<script>function showTab(b,id){document.querySelectorAll('.tc').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tbtn').forEach(x=>x.classList.remove('active'));document.getElementById(id).classList.add('active');b.classList.add('active');}<\/script>`);
if(p)setTimeout(()=>{drawBarChart(p.document.getElementById('barCv').getContext('2d'),vars.map((_,i)=>`PC${i+1}`),vars.map(v=>v*100),{title:'Explained Variance (%)',dec:1});drawScatterPlot(p.document.getElementById('scCv').getContext('2d'),pts.map(q=>q.x),pts.map(q=>q.y),{xLabel:'PC1',yLabel:'PC2',title:'PCA 2D Projection'});},300);
addLog(`[PCA] ${nc}comp, 설명력=${(tot*100).toFixed(1)}%`,'success');}

</script>
